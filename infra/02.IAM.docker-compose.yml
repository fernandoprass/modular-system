services:
  db:
    image: postgres:17-alpine
    container_name: postgres_db
    restart: always
    # 1. Performance: Increase Shared Memory for Postgres buffers
    shm_size: '2gb' 
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    # 2. Stability: Prevent the container from starving the Host OS
    deploy:
      resources:
        limits:
          memory: 8gb
          cpus: '4.0'
    # 3. Tuning: Apply our calculated parameters directly
    command: >
      postgres 
      -c shared_buffers=2GB 
      -c effective_cache_size=6GB 
      -c work_mem=64MB 
      -c maintenance_work_mem=512MB 
      -c random_page_cost=1.1
      -c max_connections=200
    # 4. Reliability: Ensure the DB is actually ready before PgAdmin starts
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
     
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin_gui
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "8080:80"
    volumes:
      - ./servers.json:/pgadmin4/servers.json
    depends_on:
      db:
        condition: service_healthy # Wait for Healthcheck to pass

volumes:
  postgres_data: